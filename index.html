<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Badminton EPS - Parcours Zones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliothèque pour les confettis -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body { 
            touch-action: manipulation; 
            -webkit-user-select: none;
            user-select: none;
            background-color: #020617;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: white;
        }
        
        .score-led { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px currentColor; }
        
        .court-bg { 
            background-color: #064e3b; 
            position: relative; 
            border: 4px solid white; 
            cursor: crosshair; 
        }
        
        .line { position: absolute; background-color: rgba(255, 255, 255, 0.9); z-index: 5; pointer-events: none; }
        
        .net-separator { 
            position: absolute; 
            width: 4px; 
            height: 100%; 
            left: 50%; 
            top: 0;
            transform: translateX(-50%); 
            z-index: 50; 
            background-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .hidden-view { display: none !important; }
        
        .target-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px dashed;
            transition: all 0.3s ease;
        }

        .overlay-a { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.15); }
        .overlay-b { border-color: #f97316; background-color: rgba(249, 115, 22, 0.15); }

        .overlay-label {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 0.05em;
            background: rgba(0,0,0,0.5);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .impact-point {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            z-index: 60;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
        }

        .chart-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(#fbbf24 var(--p), #1e293b 0);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chart-container::after {
            content: "";
            position: absolute;
            width: 75px;
            height: 75px;
            background: #0f172a;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-950">

    <!-- MENU DE CONFIGURATION -->
    <div id="setupView" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 w-full max-w-4xl shadow-2xl">
            <h1 class="text-2xl font-black mb-6 text-center text-yellow-500 uppercase italic">Badminton : Parcours Performance</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <!-- Joueur A -->
                <div class="bg-slate-900/80 p-5 rounded-2xl border border-red-500/30">
                    <h2 class="text-red-500 font-black uppercase text-sm mb-4">Joueur A (Gauche)</h2>
                    <div id="progressionA" class="grid grid-cols-2 gap-2 mb-4"></div>
                    <div class="space-y-3">
                        <select id="targetA" class="w-full bg-slate-700 p-3 rounded-xl text-sm font-bold border border-slate-600 focus:ring-2 ring-red-500"></select>
                        <select id="diffA" class="w-full bg-slate-700 p-3 rounded-xl text-sm font-bold border border-slate-600">
                            <option value="easy">Niveau : Facile</option>
                            <option value="medium" selected>Niveau : Moyen</option>
                            <option value="hard">Niveau : Expert</option>
                        </select>
                    </div>
                </div>

                <!-- Joueur B -->
                <div class="bg-slate-900/80 p-5 rounded-2xl border border-orange-500/30">
                    <h2 class="text-orange-500 font-black uppercase text-sm mb-4">Joueur B (Droite)</h2>
                    <div id="progressionB" class="grid grid-cols-2 gap-2 mb-4"></div>
                    <div class="space-y-3">
                        <select id="targetB" class="w-full bg-slate-700 p-3 rounded-xl text-sm font-bold border border-slate-600 focus:ring-2 ring-orange-500"></select>
                        <select id="diffB" class="w-full bg-slate-700 p-3 rounded-xl text-sm font-bold border border-slate-600">
                            <option value="easy">Niveau : Facile</option>
                            <option value="medium" selected>Niveau : Moyen</option>
                            <option value="hard">Niveau : Expert</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <select id="matchType" onchange="toggleMatchParams()" class="bg-slate-700 p-4 rounded-xl text-sm font-bold">
                        <option value="points">Match aux Points</option>
                        <option value="time">Match au Temps</option>
                    </select>
                    <select id="matchValue" class="bg-slate-700 p-4 rounded-xl text-sm font-bold"></select>
                </div>
                <button onclick="startMatch()" class="w-full bg-yellow-500 text-black py-5 rounded-2xl font-black text-xl uppercase shadow-lg transform active:scale-95 transition-all">
                    Lancer le Match
                </button>
            </div>
        </div>
    </div>

    <!-- ECRAN DE MATCH -->
    <div id="matchView" class="flex flex-col h-full w-full hidden-view">
        <header class="bg-slate-900 border-b border-slate-700 p-3 flex justify-between items-center px-6">
            <div class="flex items-center gap-4">
                <div id="scoreA" class="score-led text-5xl text-red-500 bg-black px-4 py-1 rounded-xl border border-red-900">00</div>
                <div class="text-[10px] font-black leading-tight">JOUEUR A<br><span id="countA" class="text-white text-sm">0</span> volants</div>
            </div>

            <div class="text-center">
                <div id="gameTimer" class="score-led text-4xl text-yellow-500">00:00</div>
                <button onclick="endGame()" class="mt-1 bg-red-600 px-3 py-1 rounded text-[10px] font-black uppercase italic">Arrêter</button>
            </div>

            <div class="flex items-center gap-4 text-right">
                <div class="text-[10px] font-black leading-tight">JOUEUR B<br><span id="countB" class="text-white text-sm">0</span> volants</div>
                <div id="scoreB" class="score-led text-5xl text-orange-500 bg-black px-4 py-1 rounded-xl border border-orange-900">00</div>
            </div>
        </header>

        <main class="flex-1 bg-slate-950 p-4 flex items-center justify-center overflow-hidden">
            <div id="court" class="court-bg h-full max-w-full aspect-[13.4/6.1]">
                <!-- Zones visibles -->
                <div id="overlayA" class="target-overlay overlay-a">
                    <span class="overlay-label text-red-400">ZONE A</span>
                </div>
                <div id="overlayB" class="target-overlay overlay-b">
                    <span class="overlay-label text-orange-400">ZONE B</span>
                </div>
                
                <div class="lines-container h-full w-full relative"></div>
                <div class="net-separator"></div>
                <div id="impactsContainer" class="absolute inset-0 pointer-events-none z-40"></div>
            </div>
        </main>
        
        <footer class="bg-slate-900 p-4 flex gap-4">
             <button onclick="handleFault('A')" class="flex-1 bg-red-900/60 border border-red-700 rounded-xl font-black text-xs uppercase p-4">Faute A (+1 B)</button>
             <button onclick="undoLast()" class="bg-slate-700 rounded-xl px-10 font-black text-xs uppercase">Annuler</button>
             <button onclick="handleFault('B')" class="flex-1 bg-orange-900/60 border border-orange-700 rounded-xl font-black text-xs uppercase p-4">Faute B (+1 A)</button>
        </footer>
    </div>

    <!-- BILAN ET VALIDATION -->
    <div id="statsView" class="fixed inset-0 z-[200] bg-slate-950 hidden-view flex flex-col p-6 overflow-y-auto">
        <div class="max-w-4xl mx-auto w-full pb-10">
            <h2 class="text-3xl font-black text-center mb-8 uppercase text-yellow-500 italic">Résultats Tactiques</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <!-- Stat A -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <div class="text-red-500 font-black uppercase text-sm mb-6">Bilan Joueur A</div>
                    <div class="flex items-center gap-6 mb-6">
                        <div id="chartA" class="chart-container" style="--p: 0%">
                            <div class="relative z-10 font-black text-xl" id="valA">0/0</div>
                        </div>
                        <div class="flex-1 text-sm space-y-1">
                            <div class="flex justify-between"><span>Dans la zone :</span><span id="statBonusA" class="font-bold text-yellow-500">0</span></div>
                            <div class="flex justify-between"><span>Hors zone :</span><span id="statNormalA" class="font-bold">0</span></div>
                            <div class="pt-2 border-t border-slate-800 text-lg font-black">Score : <span id="statScoreA">0</span></div>
                        </div>
                    </div>
                    <div id="statusA" class="p-4 rounded-xl text-center font-black uppercase text-[11px] mb-4 min-h-[50px] flex items-center justify-center border border-slate-800">--</div>
                    <button id="validBtnA" onclick="confirmValidation('A')" class="w-full bg-green-600 hover:bg-green-500 p-4 rounded-2xl font-black uppercase text-sm transition-all hidden">Enregistrer Performance ✅</button>
                </div>

                <!-- Stat B -->
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <div class="text-orange-500 font-black uppercase text-sm mb-6">Bilan Joueur B</div>
                    <div class="flex items-center gap-6 mb-6">
                        <div id="chartB" class="chart-container" style="--p: 0%">
                            <div class="relative z-10 font-black text-xl" id="valB">0/0</div>
                        </div>
                        <div class="flex-1 text-sm space-y-1">
                            <div class="flex justify-between"><span>Dans la zone :</span><span id="statBonusB" class="font-bold text-yellow-500">0</span></div>
                            <div class="flex justify-between"><span>Hors zone :</span><span id="statNormalB" class="font-bold">0</span></div>
                            <div class="pt-2 border-t border-slate-800 text-lg font-black">Score : <span id="statScoreB">0</span></div>
                        </div>
                    </div>
                    <div id="statusB" class="p-4 rounded-xl text-center font-black uppercase text-[11px] mb-4 min-h-[50px] flex items-center justify-center border border-slate-800">--</div>
                    <button id="validBtnB" onclick="confirmValidation('B')" class="w-full bg-green-600 hover:bg-green-500 p-4 rounded-2xl font-black uppercase text-sm transition-all hidden">Enregistrer Performance ✅</button>
                </div>
            </div>

            <button onclick="returnToSetup()" class="w-full bg-slate-800 py-5 rounded-2xl font-black text-lg uppercase shadow-xl border border-slate-700">
                Match suivant / Changer de zone
            </button>
        </div>
    </div>

    <script>
        const ZONES = {
            'back': { name: 'Fond de Court', baseSize: 22 },
            'front': { name: 'Zone Filet', baseSize: 20 },
            'top': { name: 'Couloir Haut', baseSize: 25 },
            'bottom': { name: 'Couloir Bas', baseSize: 25 }
        };

        const DIFF = { 
            'easy': { label: 'FACILE', val: 1.2, color: 'bg-blue-600' },
            'medium': { label: 'MOYEN', val: 0.9, color: 'bg-purple-600' },
            'hard': { label: 'EXPERT', val: 0.6, color: 'bg-red-700' }
        };

        const state = {
            playerA: { validated: {}, currentTarget: 'back', currentDiff: 'medium' },
            playerB: { validated: {}, currentTarget: 'back', currentDiff: 'medium' },
            lastStats: { A: null, B: null },
            match: { scoreA: 0, scoreB: 0, countA: 0, countB: 0, history: [], time: 0, limit: 11, type: 'points', interval: null }
        };

        function init() { 
            toggleMatchParams(); 
            populateSelectors();
            renderProgression(); 
            drawLines(); 
        }

        function populateSelectors() {
            ['A', 'B'].forEach(p => {
                const sel = document.getElementById(`target${p}`);
                sel.innerHTML = '';
                Object.keys(ZONES).forEach(zk => {
                    sel.add(new Option(ZONES[zk].name.toUpperCase(), zk));
                });
            });
        }

        function toggleMatchParams() {
            const type = document.getElementById('matchType').value;
            const select = document.getElementById('matchValue');
            select.innerHTML = '';
            if (type === 'time') {
                [3, 5, 8].forEach(v => select.add(new Option(`${v} Minutes`, v * 60)));
            } else {
                [11, 15, 21].forEach(v => select.add(new Option(`${v} Points`, v)));
            }
        }

        function renderProgression() {
            ['A', 'B'].forEach(p => {
                const container = document.getElementById(`progression${p}`);
                container.innerHTML = '';
                
                Object.keys(ZONES).forEach(zk => {
                    const data = state[`player${p}`].validated[zk];
                    const div = document.createElement('div');
                    div.className = `p-2 rounded-xl border text-center flex flex-col justify-center min-h-[60px] ${data ? 'bg-slate-800 border-green-500' : 'bg-slate-900/50 border-slate-800 opacity-40'}`;
                    
                    if (data) {
                        div.innerHTML = `
                            <div class="text-[7px] font-black uppercase opacity-60">${ZONES[zk].name}</div>
                            <div class="text-[9px] font-bold text-green-400 mt-1">${data.inZone}/${data.threshold}</div>
                            <div class="text-[6px] mt-1 inline-block px-1 rounded text-white ${DIFF[data.diff].color}">${DIFF[data.diff].label}</div>
                        `;
                    } else {
                        div.innerHTML = `<div class="text-[7px] font-black uppercase opacity-40">${ZONES[zk].name}</div><div class="text-[10px] mt-1 opacity-20">---</div>`;
                    }
                    container.appendChild(div);
                });
            });
        }

        function drawLines() {
            const container = document.querySelector('.lines-container');
            container.innerHTML = '';
            const hLines = [{ t: 0, h: 2 }, { t: 6, h: 1 }, { t: 94, h: 1 }, { t: 100, h: 2 }];
            const vLines = [{ l: 0, w: 2 }, { l: 5, w: 1 }, { l: 35, w: 1 }, { l: 65, w: 1 }, { l: 95, w: 1 }, { l: 100, w: 2 }];
            hLines.forEach(l => {
                const d = document.createElement('div'); d.className = 'line w-full'; d.style.top = `calc(${l.t}% - ${l.h/2}px)`; d.style.height = `${l.h}px`; container.appendChild(d);
            });
            vLines.forEach(l => {
                const d = document.createElement('div'); d.className = 'line h-full'; d.style.left = `calc(${l.l}% - ${l.w/2}px)`; d.style.width = `${l.w}px`; container.appendChild(d);
            });
        }

        function startMatch() {
            state.playerA.currentTarget = document.getElementById('targetA').value;
            state.playerA.currentDiff = document.getElementById('diffA').value;
            state.playerB.currentTarget = document.getElementById('targetB').value;
            state.playerB.currentDiff = document.getElementById('diffB').value;
            state.match.type = document.getElementById('matchType').value;
            const val = parseInt(document.getElementById('matchValue').value);
            
            state.match.scoreA = 0; state.match.scoreB = 0; 
            state.match.countA = 0; state.match.countB = 0; 
            state.match.history = [];
            document.getElementById('impactsContainer').innerHTML = '';
            
            if (state.match.type === 'time') { 
                state.match.time = val; 
                startTimer(); 
            } else { 
                state.match.limit = val; 
                document.getElementById('gameTimer').innerText = "OBJ : " + val; 
            }
            
            document.getElementById('setupView').classList.add('hidden-view');
            document.getElementById('matchView').classList.remove('hidden-view');
            updateOverlays(); updateUI();
        }

        function startTimer() {
            state.match.interval = setInterval(() => {
                state.match.time--;
                const m = Math.floor(state.match.time / 60); const s = state.match.time % 60;
                document.getElementById('gameTimer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                if(state.match.time <= 0) endGame();
            }, 1000);
        }

        document.getElementById('court').addEventListener('mousedown', (e) => {
            const rect = court.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            const targetPlayer = x > 50 ? 'A' : 'B'; 
            const target = state[`player${targetPlayer}`].currentTarget;
            const diff = state[`player${targetPlayer}`].currentDiff;
            let inZone = false;
            
            const size = ZONES[target].baseSize * DIFF[diff].val;
            if (targetPlayer === 'A') { 
                if (target === 'back' && x > (100 - size)) inZone = true;
                if (target === 'front' && x >= 50 && x < (50 + size)) inZone = true;
                if (target === 'top' && y < size) inZone = true;
                if (target === 'bottom' && y > (100 - size)) inZone = true;
            } else { 
                if (target === 'back' && x < size) inZone = true;
                if (target === 'front' && x <= 50 && x > (50 - size)) inZone = true;
                if (target === 'top' && y < size) inZone = true;
                if (target === 'bottom' && y > (100 - size)) inZone = true;
            }
            addPoint(targetPlayer, x, y, inZone);
        });

        function addPoint(p, x, y, inZone) {
            const pts = inZone ? 3 : 1;
            if (p === 'A') { state.match.scoreA += pts; state.match.countA++; } 
            else { state.match.scoreB += pts; state.match.countB++; }
            
            const id = Date.now();
            state.match.history.push({ id, p, pts, inZone, x, y });
            
            const d = document.createElement('div');
            d.id = `impact-${id}`;
            d.className = `impact-point border-2 ${inZone ? 'bg-yellow-400 border-white text-black' : 'bg-slate-700/50 border-slate-500 text-white/50'}`;
            d.style.left = `${x}%`; d.style.top = `${y}%`;
            d.innerText = inZone ? '★' : '1';
            document.getElementById('impactsContainer').appendChild(d);
            
            updateUI();
            if (state.match.type === 'points' && (state.match.scoreA >= state.match.limit || state.match.scoreB >= state.match.limit)) endGame();
        }

        function updateUI() {
            document.getElementById('scoreA').innerText = state.match.scoreA.toString().padStart(2,'0');
            document.getElementById('scoreB').innerText = state.match.scoreB.toString().padStart(2,'0');
            document.getElementById('countA').innerText = state.match.countA;
            document.getElementById('countB').innerText = state.match.countB;
        }

        function updateOverlays() {
            setOverlay('A', state.playerA.currentTarget, state.playerA.currentDiff, 'right');
            setOverlay('B', state.playerB.currentTarget, state.playerB.currentDiff, 'left');
        }

        function setOverlay(p, key, diff, side) {
            const el = document.getElementById(`overlay${p}`);
            const size = ZONES[key].baseSize * DIFF[diff].val;
            
            el.style.width = '50%'; el.style.height = '100%'; el.style.top = '0'; el.style.left = side === 'right' ? '50%' : '0'; el.style.bottom = 'auto'; el.style.right = 'auto';

            if(key === 'back') { 
                el.style.width = size + '%'; 
                if(side === 'right') el.style.left = (100 - size) + '%'; 
            } else if(key === 'front') { 
                el.style.width = size + '%'; 
                if(side === 'left') el.style.left = (50 - size) + '%'; 
            } else if(key === 'top') { 
                el.style.height = size + '%'; 
            } else if(key === 'bottom') { 
                el.style.height = size + '%'; el.style.top = 'auto'; el.style.bottom = '0'; 
            }
            el.querySelector('.overlay-label').innerText = `CIBLE ${p}`;
        }

        function handleFault(fBy) { addPoint(fBy === 'A' ? 'B' : 'A', fBy === 'A' ? 75 : 25, 50, false); }

        function undoLast() {
            const h = state.match.history.pop(); if(!h) return;
            if(h.p === 'A') { state.match.scoreA -= h.pts; state.match.countA--; } 
            else { state.match.scoreB -= h.pts; state.match.countB--; }
            const el = document.getElementById(`impact-${h.id}`); if(el) el.remove();
            updateUI();
        }

        function endGame() {
            if(state.match.interval) clearInterval(state.match.interval);
            document.getElementById('matchView').classList.add('hidden-view');
            document.getElementById('statsView').classList.remove('hidden-view');
            ['A', 'B'].forEach(p => calculateBilan(p));
        }

        function calculateBilan(p) {
            const history = state.match.history.filter(h => h.p === p);
            const inZone = history.filter(h => h.inZone).length;
            const score = p === 'A' ? state.match.scoreA : state.match.scoreB;
            
            let threshold = 3; 
            if (state.match.type === 'points') {
                if (state.match.limit === 11) threshold = 2;
                else if (state.match.limit === 15) threshold = 3;
                else if (state.match.limit === 21) threshold = 4;
            }

            const percentDisplay = Math.min(100, Math.round((inZone / threshold) * 100));

            state.lastStats[p] = { 
                key: state[`player${p}`].currentTarget, 
                diff: state[`player${p}`].currentDiff, 
                inZone: inZone,
                threshold: threshold
            };

            document.getElementById(`chart${p}`).style.setProperty('--p', percentDisplay + '%');
            document.getElementById(`val${p}`).innerText = `${inZone}/${threshold}`;
            document.getElementById(`statBonus${p}`).innerText = inZone;
            document.getElementById(`statNormal${p}`).innerText = history.length - inZone;
            document.getElementById(`statScore${p}`).innerText = score;

            const status = document.getElementById(`status${p}`);
            const btn = document.getElementById(`validBtn${p}`);

            if (inZone >= threshold) {
                status.innerText = `OBJECTIF RÉUSSI (${inZone} COUPS) !`;
                status.className = "p-4 rounded-xl text-center font-black uppercase text-[11px] bg-green-900/40 text-green-400 border border-green-700/50";
                btn.classList.remove('hidden');
            } else {
                status.innerText = `ÉCHEC : IL MANQUE ${threshold - inZone} COUP(S) EN ZONE`;
                status.className = "p-4 rounded-xl text-center font-black uppercase text-[11px] bg-red-900/20 text-red-400 border border-red-900/30";
                btn.classList.add('hidden');
            }
        }

        function fireConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function confirmValidation(p) {
            const stats = state.lastStats[p];
            state[`player${p}`].validated[stats.key] = stats;
            
            // Si le niveau est expert, on lance les confettis !
            if (stats.diff === 'hard') {
                fireConfetti();
            }

            document.getElementById(`validBtn${p}`).classList.add('hidden');
            document.getElementById(`status${p}`).innerText = "PERFORMANCE ENREGISTRÉE ✅";
            document.getElementById(`status${p}`).className = "p-4 rounded-xl text-center font-black uppercase text-[11px] bg-blue-600 text-white";
        }

        function returnToSetup() {
            document.getElementById('statsView').classList.add('hidden-view');
            document.getElementById('setupView').classList.remove('hidden-view');
            renderProgression();
        }

        window.onload = init;
    </script>
</body>
</html>
